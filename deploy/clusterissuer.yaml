---
# ClusterIssuer using the Namecheap DNS-01 webhook solver.
# Supports wildcard certificates (*.example.com).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your@email.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.yourdomain.com   # must match GROUP_NAME in deployment
            solverName: namecheap
            config:
              secretName: namecheap-credentials
              secretNamespace: cert-manager

---
# Staging issuer for testing (higher rate limits)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: your@email.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.yourdomain.com
            solverName: namecheap
            config:
              secretName: namecheap-credentials
              secretNamespace: cert-manager

---
# Example Certificate using the issuer (wildcard)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: groot-rocks-wildcard
  namespace: default
spec:
  secretName: groot-rocks-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - "groot.rocks"
    - "*.groot.rocks"

# --- CAA config reference ---
# By default the webhook automatically ensures CAA records for letsencrypt.org
# exist before each challenge. To disable or customize:
#
#   config:
#     secretName: namecheap-credentials
#     secretNamespace: cert-manager
#     ensureCAA: false        # disable automatic CAA management
#     caaIssuer: "letsencrypt.org"  # default, change if using a different CA
