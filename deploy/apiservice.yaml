---
# This registers the webhook as an API server extension.
# cert-manager uses this to discover and call the solver.
apiVersion: apiregistration.k8s.io/v1
kind: APIService
metadata:
  name: v1alpha1.acme.yourdomain.com
  labels:
    app: cert-manager-webhook-namecheap
  annotations:
    cert-manager.io/inject-ca-from: "cert-manager/cert-manager-webhook-namecheap-tls"
spec:
  group: acme.yourdomain.com
  groupPriorityMinimum: 1000
  versionPriority: 15
  service:
    name: cert-manager-webhook-namecheap
    namespace: cert-manager
  version: v1alpha1
  insecureSkipTLSVerify: false

---
# Certificate for the webhook TLS (signed by cert-manager itself)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cert-manager-webhook-namecheap-tls
  namespace: cert-manager
  labels:
    app: cert-manager-webhook-namecheap
spec:
  secretName: cert-manager-webhook-namecheap-tls
  duration: 8760h  # 1 year
  renewBefore: 360h
  issuerRef:
    name: cert-manager-webhook-namecheap-ca
    kind: Issuer
  dnsNames:
    - cert-manager-webhook-namecheap
    - cert-manager-webhook-namecheap.cert-manager
    - cert-manager-webhook-namecheap.cert-manager.svc
    - cert-manager-webhook-namecheap.cert-manager.svc.cluster.local

---
# Self-signed CA issuer for the webhook's own TLS certificate
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: cert-manager-webhook-namecheap-ca
  namespace: cert-manager
  labels:
    app: cert-manager-webhook-namecheap
spec:
  selfSigned: {}
